<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход</title>
</head>
<body>
  <script>
  if (window.top === window.self) {
    // Если страница открыта НЕ в iframe — отправляем обратно в iframe
    window.location.href = "https://YOUR-RAILWAY-APP.up.railway.app/login.html";
  }
</script>
  <h2>Авторизация</h2>

  <form action="/auth" method="POST">
    <label>Логин: <input type="text" name="login" required></label><br><br>
    <label>Пароль: <input type="password" name="password" required></label><br><br>

    <button type="submit">Войти</button>
  </form>

  <p style="color:red;">
    <script>
      if (location.search.includes("error=1")) {
        document.write("Неверный логин или пароль");
      }
    </script>
  </p>
</body>
</html>
