<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Логи</title>
</head>
<body>
  <h2>Журнал действий</h2>

  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>ID</th>
        <th>Время</th>
        <th>Действие</th>
        <th>Детали</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    fetch("/api/logs")
      .then(r => r.json())
      .then(data => {
        document.getElementById("rows").innerHTML = data.map(l => `
          <tr>
            <td>${l.id}</td>
            <td>${l.time}</td>
            <td>${l.action}</td>
            <td>${JSON.stringify(l.details)}</td>
          </tr>
        `).join("");
      });
  </script>

  <br>
  <a href="/list.html">Назад</a>
</body>
</html>
