<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавить запись</title>
</head>
<body>
  <script>
  if (window.top === window.self) {
    // Если страница открыта НЕ в iframe — отправляем обратно в iframe
    window.location.href = "https://project-root-production-6a2f.up.railway.app/login.html";
  }
</script>
  <h2>Добавить запись</h2>

  <form action="/api/add" method="POST">
    <label>Дата: <input type="date" name="date" required></label><br><br>
    <label>Время: <input type="time" name="time" required></label><br><br>
    <label>Широта: <input type="text" name="lat" required></label><br><br>
    <label>Долгота: <input type="text" name="lon" required></label><br><br>
    <label>Магнитуда: <input type="number" step="0.1" name="magnitude" required></label><br><br>

    <button type="submit">Добавить</button>
  </form>

  <br>
  <a href="/list.html">Перейти к журналу</a>
   <script>
  document.addEventListener("click", function(e) {
    const link = e.target.closest("a");
    if (!link) return;

    const allowed = "https://project-root-production-6a2f.up.railway.app/";

    try {
      const url = new URL(link.href);

      // Если ссылка ведёт НЕ на твой Railway — блокируем
      if (!url.host.includes(allowed)) {
        e.preventDefault();
        alert("Переход вне кабинета запрещён");
      }
    } catch (err) {
      // На случай относительных ссылок — они разрешены
    }
  });
</script>
  <script>
  function sendHeight() {
    const height = document.body.scrollHeight;
    parent.postMessage({ frameHeight: height }, "*");
  }

  // отправляем высоту при загрузке
  window.onload = sendHeight;

  // отправляем высоту при изменениях
  setInterval(sendHeight, 500);
</script>
  <script>
  // Блокируем правый клик
  document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
  });

  // Блокируем выделение текста
  document.addEventListener("selectstart", function(e) {
    e.preventDefault();
  });

  // Блокируем копирование
  document.addEventListener("copy", function(e) {
    e.preventDefault();
  });

  // Блокируем Ctrl+S, Ctrl+U, Ctrl+Shift+I, F12
  document.addEventListener("keydown", function(e) {
    if (
      (e.ctrlKey && e.key === "s") ||
      (e.ctrlKey && e.key === "u") ||
      (e.ctrlKey && e.shiftKey && e.key === "I") ||
      e.key === "F12"
    ) {
      e.preventDefault();
    }
  });
</script>
</body>
</html>
