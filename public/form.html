<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавить запись</title>
</head>
<body>
  <h2>Добавить запись</h2>

  <form action="/api/add" method="POST">
    <label>Дата: <input type="date" name="date" required></label><br><br>
    <label>Время: <input type="time" name="time" required></label><br><br>
    <label>Широта: <input type="text" name="lat" required></label><br><br>
    <label>Долгота: <input type="text" name="lon" required></label><br><br>
    <label>Магнитуда: <input type="number" step="0.1" name="magnitude" required></label><br><br>

    <button type="submit">Добавить</button>
  </form>

  <br>
  <a href="/list.html">Перейти к журналу</a>
</body>
</html>
