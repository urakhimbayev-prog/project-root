<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактировать запись</title>
</head>
<body>
  <script>
  if (window.top === window.self) {
    // Если страница открыта НЕ в iframe — отправляем обратно в iframe
    window.location.href = "https://project-root-production-6a2f.up.railway.app/login.html";
  }
</script>
  <h2>Редактировать запись</h2>

  <form id="editForm" method="POST">
    <label>Дата: <input type="date" name="date" required></label><br><br>
    <label>Время: <input type="time" name="time" required></label><br><br>
    <label>Широта: <input type="text" name="lat" required></label><br><br>
    <label>Долгота: <input type="text" name="lon" required></label><br><br>
    <label>Магнитуда: <input type="number" step="0.1" name="magnitude" required></label><br><br>

    <button type="submit">Сохранить</button>
  </form>

  <br>
  <a href="/list.html">Назад к журналу</a>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    fetch("/api/earthquakes")
      .then(r => r.json())
      .then(data => {
        const record = data.find(r => r.id == id);
        if (!record) {
          alert("Запись не найдена");
          location.href = "/list.html";
          return;
        }

        const form = document.getElementById("editForm");
        form.action = "/api/update/" + id;

        form.date.value = record.date;
        form.time.value = record.time;
        form.lat.value = record.lat;
        form.lon.value = record.lon;
        form.magnitude.value = record.magnitude;
      });
  </script>
  <script>
  document.addEventListener("click", function(e) {
    const link = e.target.closest("a");
    if (!link) return;

    const allowed = "https://project-root-production-6a2f.up.railway.app/";

    try {
      const url = new URL(link.href);

      // Если ссылка ведёт НЕ на твой Railway — блокируем
      if (!url.host.includes(allowed)) {
        e.preventDefault();
        alert("Переход вне кабинета запрещён");
      }
    } catch (err) {
      // На случай относительных ссылок — они разрешены
    }
  });
</script>
</body>
</html>
