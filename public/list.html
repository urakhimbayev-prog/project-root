<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Журнал сейсмособытий</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header class="top-bar">
    <h1>Журнал сейсмособытий</h1>
    <div>
      <a href="/api/export" class="btn">Экспорт CSV</a>
      <a href="/logout" class="btn btn-outline">Выход</a>
    </div>
  </header>

  <main class="layout">
    <section class="left">
      <h2>Добавить событие</h2>
      <form method="POST" action="/api/add" class="form-grid">
        <label>Дата</label>
        <input type="date" name="date" required />

        <label>Время</label>
        <input type="time" name="time" required />

        <label>Магнитуда</label>
        <input type="number" step="0.1" name="magnitude" required />

        <label>Широта</label>
        <input type="number" step="0.0001" name="lat" required />

        <label>Долгота</label>
        <input type="number" step="0.0001" name="lon" required />

        <label>Комментарий</label>
        <textarea name="comment" rows="2"></textarea>

        <button type="submit" class="btn full">Сохранить</button>
      </form>

      <h2>Список событий</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Время</th>
            <th>M</th>
            <th>Широта</th>
            <th>Долгота</th>
            <th>Комментарий</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>

    <section class="right">
      <h2>Карта</h2>
      <div id="map"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
