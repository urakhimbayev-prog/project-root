<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Журнал событий</title>
</head>
<body>
  <script>
  if (window.top === window.self) {
    // Если страница открыта НЕ в iframe — отправляем обратно в iframe
    window.location.href = "https://project-root-production-6a2f.up.railway.app/login.html";
  }
</script>
  <h2>Журнал событий</h2>

  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>ID</th>
        <th>Дата</th>
        <th>Время</th>
        <th>Координаты</th>
        <th>Магнитуда</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    fetch("/api/earthquakes")
      .then(r => r.json())
      .then(data => {
        const rows = document.getElementById("rows");
        rows.innerHTML = data.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.date}</td>
            <td>${r.time}</td>
            <td>${r.lat}, ${r.lon}</td>
            <td>${r.magnitude}</td>
            <td>
              <a href="/edit.html?id=${r.id}">Изменить</a> |
              <a href="/api/delete/${r.id}" onclick="return confirm('Удалить запись?')">Удалить</a>
            </td>
          </tr>
        `).join("");
      });
  </script>

  <br>
  <a href="/form.html">Добавить новую запись</a>
  <br><br>
  <a href="/logout">Выйти</a>
</body>
</html>
